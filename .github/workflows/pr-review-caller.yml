name: PR Review Caller

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

jobs:
  call-central-review:
    uses: Luiz-1337/repo-automacoes/.github/workflows/reusable-pr-review.yml
    with:
      target_repository: ${{ github.repository }}
      target_pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit